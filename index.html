<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Bear</title>

    <style>
        body {
            margin: 0;
            background-color: #000;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }

        .item {
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .item {
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="item"><img src="images/0.png"></div>
        <div class="item"><img src="images/1.png"></div>
        <div class="item"><img src="images/2.png"></div>
        <div class="item"><img src="images/3.png"></div>
        <div class="item"><img src="images/4.png"></div>
        <div class="item"><img src="images/5.png"></div>
        <div class="item"><img src="images/6.png"></div>
    </div>

</body>
</html>
